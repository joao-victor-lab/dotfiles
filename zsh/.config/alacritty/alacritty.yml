window:
  padding:
    x: 5
    y: 5
  class:
    instance: Alacritty
    general: Alacritty
  opacity: 1

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: BitstromWera Nerd Font  
    style:  Regular
  bold:
    family: BitstromWera Nerd Font 
    style:  Bold
  italic:
    family: BitstromWera Nerd Font 
    style:  Italic
  bold_italic:
    family: BitstromWera Nerd Fon 
    style: Bold Italic
  size: 8
draw_bold_text_with_bright_colors: true

import:
  - ~/.config/alacritty/themes/themes/tokyo-night.yaml


cursor:
  style: 
    shape: Beam
    blinking: "Always"


selection:
  save_to_clipboard: true

shell:
  program: /usr/bin/zsh

key_bindings:
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }
